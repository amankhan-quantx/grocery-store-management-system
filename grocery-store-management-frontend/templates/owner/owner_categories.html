{% extends "owner/owner_base.html" %}

{% block title %}
Categories
{% endblock %}

{% block content %}

<h1>Categories</h1>

<a href="{{ url_for('categories.owner_add_category') }}" class="btn">
    + Add Category
</a>

<table>

    <thead>

        <tr>

            <th>ID</th>

            <th>Category Name</th>

            <th>Actions</th>

        </tr>

    </thead>

    <tbody>

        {% for category in categories %}

        <tr>

            <td>{{ category.id }}</td>

            <td>{{ category.name }}</td>

            <td>

                <a href="{{ url_for('categories.owner_edit_category',
                    category_id=category.id) }}">
                    Edit
                </a>

                |
                <a href="{{ url_for('categories.owner_delete_category',
                    category_id=category.id) }}">
                    Delete
                </a>

            </td>

        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
